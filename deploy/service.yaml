# ============================================================
# K8sOperation Service + ServiceAccount + RBAC
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: k8soperation
  namespace: k8soperation
  labels:
    app.kubernetes.io/name: k8soperation
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: k8soperation
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
# ============================================================
# ServiceAccount：平台需要操作 K8s API（管理多集群资源）
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8soperation
  namespace: k8soperation
  labels:
    app.kubernetes.io/name: k8soperation
---
# ============================================================
# ClusterRole：平台需要跨命名空间管理资源
# 根据实际需求收敛权限，此处给出全量示例
# ============================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8soperation
  labels:
    app.kubernetes.io/name: k8soperation
rules:
  # 核心资源（Pod/Service/ConfigMap/Secret/PV/PVC/Node/Namespace 等）
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/exec
      - pods/portforward
      - services
      - configmaps
      - secrets
      - persistentvolumes
      - persistentvolumeclaims
      - nodes
      - namespaces
      - events
      - serviceaccounts
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # 工作负载（Deployment/StatefulSet/DaemonSet/Job/CronJob）
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # 网络（Ingress）
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # 存储（StorageClass）
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # RBAC（Role/ClusterRole/RoleBinding/ClusterRoleBinding）
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - clusterroles
      - rolebindings
      - clusterrolebindings
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # CRD（AppConfig 等自定义资源）
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps.k8soperation.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Metrics（资源监控）
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - nodes
      - pods
    verbs: ["get", "list"]
---
# ============================================================
# ClusterRoleBinding
# ============================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8soperation
  labels:
    app.kubernetes.io/name: k8soperation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8soperation
subjects:
  - kind: ServiceAccount
    name: k8soperation
    namespace: k8soperation
