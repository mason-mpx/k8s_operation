# ============================================================
# Ingress（可选，提供外部访问入口）
# 需要集群已安装 Ingress Controller（如 nginx-ingress）
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k8soperation
  namespace: k8soperation
  labels:
    app.kubernetes.io/name: k8soperation
  annotations:
    # Nginx Ingress 注解
    nginx.ingress.kubernetes.io/proxy-body-size: "200m"       # 制品上传文件限制
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"    # WebSocket/长连接超时
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    # 如需 HTTPS，取消下方注释
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
    - host: k8soperation.example.com       # 替换为实际域名
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: k8soperation
                port:
                  name: http
  # 如需 HTTPS，取消下方注释
  # tls:
  #   - hosts:
  #       - k8soperation.example.com
  #     secretName: k8soperation-tls
