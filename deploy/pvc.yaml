# ============================================================
# PVC：制品存储（JAR/二进制/tar.gz 等 CI/CD 构建产物）
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: k8soperation-artifacts
  namespace: k8soperation
  labels:
    app.kubernetes.io/name: k8soperation
    app.kubernetes.io/component: artifact-storage
spec:
  accessModes:
    - ReadWriteOnce           # 单副本用 RWO；多副本需改为 ReadWriteMany + NFS/CephFS
  storageClassName: ""        # 留空使用默认 StorageClass，或指定具体名称
  resources:
    requests:
      storage: 20Gi           # 根据制品量调整，每次构建 ~10-50MB
---
# ============================================================
# PVC：应用日志存储（可选，也可以用 stdout + 日志采集方案替代）
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: k8soperation-logs
  namespace: k8soperation
  labels:
    app.kubernetes.io/name: k8soperation
    app.kubernetes.io/component: log-storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  resources:
    requests:
      storage: 5Gi
