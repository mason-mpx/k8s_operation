      cpu_threshold:
        type: integer
      disk_threshold:
        type: integer
      mem_threshold:
        type: integer
    type: object
  models.AppStoreCreateRequest:
    properties:
      category:
        type: string
      chart_url:
        type: string
      description:
        type: string
      display_name:
        type: string
      doc_url:
        type: string
