        type: integer
      color:
        description: 环境颜色标识
        type: string
      description:
        description: 描述
        type: string
      display_name:
        description: 显示名称
        type: string
      name:
        description: 环境名称(dev/staging/prod)
        type: string
      namespace:
        description: 默认命名空间
        type: string
      require_approval:
        description: 是否需要审批
        type: boolean
      sort_order:
        description: 排序
        type: integer
    type: object
  requests.EnvironmentIDRequest:
    properties:
      id:
        type: integer
    type: object
  requests.EnvironmentUpdateRequest:
    properties:
      approval_user_ids:
        items:
          type: integer
        type: array
      cluster_id:
        type: integer
      color:
        type: string
      description:
        type: string
      display_name:
        type: string
      id:
        type: integer
      name:
        type: string
      namespace:
        type: string
      require_approval:
        type: boolean
      sort_order:
        type: integer
    type: object
  requests.EnvironmentVariable:
    properties:
      name:
        description: 环境变量名
        type: string
      value:
        description: 环境变量值
        type: string
