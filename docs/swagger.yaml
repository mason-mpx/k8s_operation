      cluster_name:
        type: string
      cluster_version:
        type: string
      kube_config:
        type: string
    type: object
  requests.K8sClusterDeleteRequest:
    properties:
      force:
        description: 可选：是否强制删除
        type: boolean
      id:
        type: integer
    type: object
  requests.K8sClusterInitRequest:
    properties:
      id:
        type: integer
    type: object
  requests.K8sClusterUpdateRequest:
    properties:
      cluster_name:
        type: string
      cluster_version:
        type: string
      id:
        type: integer
      kube_config:
        description: ✅ 可选（不填就不更新）
        type: string
    type: object
  requests.KubeAppConfigCreateRequest:
    properties:
      app_name:
        type: string
      cluster_id:
        type: integer
      enable_metrics:
        type: boolean
      env:
        description: 只校验 env 存在，不校验内部字段
        items:
          $ref: '#/definitions/requests.EnvVarKV'
        type: array
      image:
        type: string
      namespace:
        type: string
      replicas:
        description: 可选
        type: integer
      strategy:
        type: string
    type: object
  requests.KubeAppConfigUpdateRequest:
    properties:
      app_name:
        type: string
      cluster_id:
        type: integer
      enable_metrics:
        type: boolean
      env:
        description: 可选
        items:
          $ref: '#/definitions/requests.EnvVarKV'
        type: array
      image:
        type: string
      namespace:
        type: string
      replicas:
        type: integer
      strategy:
        type: string
    type: object
  requests.KubeApplyYamlClusterRequest:
    properties:
      name:
        type: string
      yaml:
        type: string
    type: object
  requests.KubeApplyYamlRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
      yaml:
        type: string
    type: object
  requests.KubeConfigMapApplyYamlRequest:
    properties:
      yaml:
        description: YAML 字符串，包含 namespace 和 name
        type: string
    type: object
  requests.KubeConfigMapCreateRequest:
    properties:
      annotations:
        type: string
      binaryData:
        additionalProperties:
          items:
            format: int32
            type: integer
          type: array
        type: object
      data:
        description: ConfigMap 的数据部分：文本型与二进制型
        type: string
      labels:
        type: string
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeConfigMapUpdateDataRequest:
    properties:
      binaryData:
        additionalProperties:
          items:
            format: int32
            type: integer
          type: array
        description: 二选一
        type: object
      data:
        additionalProperties:
          type: string
        description: 二选一
        type: object
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeCronJobCreateRequest:
    type: object
  requests.KubeCronJobDeleteRequest:
    properties:
      cascade:
        description: 是否级联清理：通常删除 CronJob 时是否一并清理其历史 Job
        type: boolean
      force:
        type: boolean
      grace_period_seconds:
        type: integer
      name:
        type: string
      namespace:
        type: string
      timeout_seconds:
        type: integer
      wait:
        type: boolean
    type: object
  requests.KubeCronJobSuspendRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
      suspend:
        description: true=暂停，false=恢复
        type: boolean
    type: object
  requests.KubeCronJobTriggerRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeDaemonSetCreateRequest:
    type: object
  requests.KubeDaemonSetRollbackRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
      revision_name:
        description: |-
          指定回滚到的历史版本（ControllerRevision）
          建议用 revision_name（更直观），如果你喜欢数字 revision 也可以再加一个 int64 字段做二选一
        type: string
    type: object
  requests.KubeDaemonSetUpdateImageRequest:
    properties:
      container:
        description: 目标容器名称
        type: string
      image:
        description: 新镜像地址，例如 nginx:1.27
        type: string
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeDeploymentCreateRequest:
    type: object
  requests.KubeDeploymentRestartRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeDeploymentRollbackRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
      replica_set:
        description: 指定回滚的 ReplicaSet
        type: string
    type: object
  requests.KubeDeploymentScaleRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
      scale_num:
        description: 副本数量
        type: integer
    type: object
  requests.KubeDeploymentUpdateImageRequest:
    properties:
      container:
        description: 目标容器名称
        type: string
      image:
        description: 新镜像地址，例如 nginx:1.27
        type: string
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeDeploymentUpdateRequest:
    type: object
  requests.KubeEventListRequest:
    properties:
      continue:
        type: string
      kind:
        description: Deployment/StatefulSet/DaemonSet/Pod/Node...
        type: string
      limit:
        description: 默认 50
        type: integer
      name:
        type: string
      namespace:
        description: 为空=全局
        type: string
      reason:
        type: string
      since_seconds:
        type: integer
      type:
        description: Normal | Warning
        type: string
    type: object
  requests.KubeIngressCreateRequest:
    properties:
      annotations:
        description: 可选注解（如 rewrite、限流等）
        type: string
      ingress_class_name:
        description: 例如："nginx"、"traefik"；可为空（走默认 class）
        type: string
      labels:
        description: 可选标签
        type: string
      name:
        type: string
      namespace:
        type: string
      rules:
        description: 规则：支持多个 host
        items:
          $ref: '#/definitions/requests.IngressRule'
        type: array
      tls:
        description: 可选 TLS 列表
        items:
          $ref: '#/definitions/requests.IngressTLS'
        type: array
    type: object
  requests.KubeJobCreateRequest:
    type: object
  requests.KubeJobRestartRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeJobSuspendRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
      suspend:
        description: true=挂起，false=恢复
        type: boolean
    type: object
  requests.KubeJobUpdateImageRequest:
    properties:
      container:
        type: string
      image:
        type: string
      name:
        type: string
      namespace:
        type: string
      touch:
        description: 可选：是否打一个 annotation 强制模板变化（方便触发 controller 识别到变更）
        type: boolean
    type: object
  requests.KubeMultiResourceApplyYamlRequest:
    properties:
      yaml:
        description: 多个 YAML 文档，用 --- 分隔
        type: string
    type: object
  requests.KubeNamespaceCreateRequest:
    properties:
      annotations:
