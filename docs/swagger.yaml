  models.AppStoreUpdateRequest:
    properties:
      category:
        type: string
      chart_url:
        type: string
      description:
        type: string
      display_name:
        type: string
      doc_url:
        type: string
      featured:
        type: integer
      icon:
        type: string
      id:
        type: integer
      min_k8s:
        type: string
      name:
        type: string
      namespace:
        type: string
      provider:
        type: string
      sort_order:
        type: integer
      status:
        type: integer
      tags:
        type: string
      values_yaml:
        type: string
      version:
        type: string
    required:
    - id
    type: object
  models.BasicSettings:
    properties:
      default_cluster:
        type: string
      default_page:
        type: string
      language:
        type: string
      timezone:
        type: string
    type: object
  models.CicdEnvResourceRule:
    properties:
      approval_role:
        description: sre/admin
        type: string
      cpu_limit_max:
        description: 资源上限
        type: string
      cpu_request_min:
        description: 资源下限
        type: string
      created_at:
        type: integer
      description:
        type: string
      env:
        description: dev/test/staging/prod
        type: string
      id:
        type: integer
      memory_limit_max:
        type: string
      memory_request_min:
        type: string
      modified_at:
        type: integer
      replicas_max:
        type: integer
      replicas_min:
        type: integer
      require_approval:
        description: 审批规则
        type: boolean
      service_type:
        description: 空=通用规则
        type: string
    type: object
  models.CicdResourceTemplate:
    properties:
      cpu_limit:
        type: string
      cpu_request:
        type: string
      created_at:
        type: integer
      description:
        type: string
      env:
        description: dev/test/staging/prod
        type: string
      hpa_cpu_target:
        description: CPU目标利用率%
        type: integer
      hpa_enabled:
        description: HPA 配置
        type: boolean
      hpa_max_replicas:
        type: integer
      hpa_min_replicas:
        type: integer
      id:
        type: integer
      is_default:
        type: boolean
      memory_limit:
        type: string
      memory_request:
        type: string
      modified_at:
        type: integer
      name:
        description: small/medium/large/custom
        type: string
      replicas_default:
        description: 资源配置
        type: integer
      replicas_max:
        type: integer
      replicas_min:
        type: integer
      service_type:
        description: java/go/node/python
        type: string
      sort_order:
        type: integer
    type: object
  models.EnvVar:
    properties:
      name:
        type: string
      value:
        type: string
    type: object
  models.HPAConfig:
    properties:
      cpu_target:
        description: CPU利用率目标%
        type: integer
      enabled:
        type: boolean
      max_replicas:
        type: integer
      min_replicas:
        type: integer
    type: object
  models.NotificationSettings:
    properties:
      dingtalk_webhook:
        type: string
      enable_dingtalk:
        type: boolean
      enable_email:
        type: boolean
      enable_webhook:
        type: boolean
      smtp_server:
        type: string
      webhook_url:
        type: string
    type: object
  models.PlatformSettingsResponse:
    properties:
      about:
        $ref: '#/definitions/models.AboutSettings'
      alert:
        $ref: '#/definitions/models.AlertSettings'
      basic:
        $ref: '#/definitions/models.BasicSettings'
      notification:
        $ref: '#/definitions/models.NotificationSettings'
      security:
        $ref: '#/definitions/models.SecuritySettings'
    type: object
  models.ResourceConfig:
    properties:
      hpa:
        $ref: '#/definitions/models.HPAConfig'
      replicas:
        type: integer
      resources:
        $ref: '#/definitions/models.ResourceRequests'
      strategy:
        description: rollingUpdate/recreate
        type: string
    type: object
  models.ResourceRequests:
    properties:
      limits:
        $ref: '#/definitions/models.ResourceValues'
      requests:
        $ref: '#/definitions/models.ResourceValues'
    type: object
  models.ResourceValidationResult:
    properties:
      approval_role:
        description: 审批角色
        type: string
      errors:
        description: 错误（不可继续）
        items:
          type: string
        type: array
      need_approval:
        description: 是否需要审批
        type: boolean
      risk_level:
        allOf:
        - $ref: '#/definitions/models.RiskLevel'
        description: 风险等级
      suggestion:
        description: 建议
        type: string
      valid:
        type: boolean
      warnings:
        description: 警告（可继续）
