        items:
          $ref: '#/definitions/requests.HttpHeader'
        type: array
      initial_delay_seconds:
        type: integer
      path:
        type: string
      period_seconds:
        type: integer
      port:
        type: integer
      protocol:
        type: string
      success_threshold:
        type: integer
      timeout_seconds:
        type: integer
      type:
        description: HTTP|TCP|Command
        type: string
    type: object
  requests.HttpHeader:
    properties:
      name:
        type: string
      value:
        type: string
    type: object
  requests.IngressPathRule:
    properties:
      path:
        description: 访问路径（如 /、/api、/api/(.*)）
        type: string
      path_type:
        description: 'pathType: Exact / Prefix / ImplementationSpecific'
        type: string
      service_name:
        description: 后端 Service 名称
        type: string
      service_port:
        description: 后端 Service 端口（支持命名端口，故用字符串；可传 "80" 或 "http"）
        type: string
    type: object
  requests.IngressRule:
    properties:
      host:
        type: string
      paths:
        items:
          $ref: '#/definitions/requests.IngressPathRule'
        type: array
