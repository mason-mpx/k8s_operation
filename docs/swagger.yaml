        type: integer
      kind:
        type: string
      message:
        type: string
      name:
        type: string
    type: object
  requests.GitBranchesRequest:
    properties:
      credential_id:
        description: 可选：Jenkins凭证ID
        type: string
      repo_url:
        type: string
    type: object
  requests.GitValidateRequest:
