        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/requests.AuthRegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 注册成功
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "409":
          description: 用户已存在/冲突
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 用户注册
      tags:
      - 认证管理
