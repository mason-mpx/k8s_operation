      credential_id:
        description: 可选：Jenkins凭证ID
        type: string
      repo_url:
        type: string
    type: object
  requests.HealthCheckDetail:
    properties:
      command:
        description: Type=Command 时使用
        type: string
      failure_threshold:
        type: integer
