        type: string
      request_reason:
        description: 申请原因
        type: string
    type: object
  requests.AuthForgotPasswordRequest:
    properties:
      confirm:
        type: string
      new_password:
        type: string
      username:
        type: string
    type: object
  requests.AuthLoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  requests.AuthRegisterRequest:
    properties:
      password:
        type: string
      password_confirm:
        type: string
      username:
        type: string
    type: object
  requests.BasicAuthFields:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  requests.BatchClusterPermissionRequest:
    properties:
      can_create:
        type: boolean
      can_delete:
        type: boolean
      can_exec:
        type: boolean
      can_update:
        type: boolean
      can_view:
        type: boolean
      cluster_ids:
        items:
          type: integer
        type: array
      role_type:
        type: string
      user_id:
        type: integer
    type: object
  requests.CicdBuildCallbackRequest:
    properties:
      build_id:
        description: Jenkins 构建ID
        type: integer
      image_digest:
        description: 镜像摘要（可选）
        type: string
      image_repo:
        description: 构建出的镜像Repo
        type: string
      image_tag:
        description: 构建出的镜像Tag
        type: string
      message:
        description: 构建消息
        type: string
      status:
        description: SUCCESS / FAILURE / ABORTED
        type: string
    type: object
  requests.CicdReleaseCreateRequest:
    properties:
      app_name:
        type: string
      cluster_ids:
        items:
          type: integer
        type: array
      concurrency:
        type: integer
      container_name:
        type: string
      image_digest:
        type: string
      image_repo:
        type: string
      image_tag:
        type: string
      namespace:
        type: string
      request_id:
        description: 可选，幂等校验用
        type: string
      strategy:
        type: string
      timeout_sec:
        type: integer
      workload_kind:
        type: string
      workload_name:
        type: string
    type: object
  requests.CicdReleaseIDRequest:
    properties:
      id:
        type: integer
    type: object
  requests.CicdReleaseUpdateRequest:
    properties:
      app_name:
        type: string
      concurrency:
        type: integer
      container_name:
        type: string
      id:
        type: integer
      image_repo:
        type: string
      image_tag:
        type: string
      message:
        type: string
      namespace:
        type: string
      strategy:
        type: string
      timeout_sec:
        type: integer
      workload_kind:
        type: string
      workload_name:
        type: string
    type: object
  requests.ClusterPermissionCreateRequest:
    properties:
      can_create:
        type: boolean
      can_delete:
        type: boolean
      can_exec:
        type: boolean
      can_update:
        type: boolean
      can_view:
        type: boolean
      cluster_id:
        type: integer
      expire_at:
        description: 过期时间，0=永不过期
        type: integer
      namespaces:
        description: 可访问的命名空间（空=全部）
        items:
          type: string
        type: array
      role_type:
        type: string
      user_id:
        type: integer
    type: object
  requests.ClusterPermissionUpdateRequest:
    properties:
      can_create:
        type: boolean
      can_delete:
        type: boolean
      can_exec:
        type: boolean
      can_update:
        type: boolean
      can_view:
        type: boolean
      expire_at:
        type: integer
      id:
        type: integer
      namespaces:
        items:
          type: string
        type: array
      role_type:
        type: string
    type: object
  requests.CommonIdRequest:
    properties:
      id:
        type: integer
    type: object
  requests.CreatedResource:
    properties:
      index:
        type: integer
      kind:
        type: string
      message:
        type: string
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.DockerFields:
    properties:
      auth:
        type: string
      email:
        type: string
      password:
        type: string
      server:
        type: string
      username:
        type: string
    type: object
  requests.EnvVarKV:
    properties:
      name:
        type: string
      value:
        type: string
    type: object
  requests.EnvironmentCreateRequest:
    properties:
      approval_user_ids:
        description: 审批人员ID列表
        items:
          type: integer
        type: array
      cluster_id:
