          type: string
        type: array
    type: object
  models.ResourceValues:
    properties:
      cpu:
        type: string
      memory:
        type: string
    type: object
  models.RiskLevel:
    enum:
    - low
    - medium
    - high
    type: string
    x-enum-varnames:
    - RiskLevelLow
    - RiskLevelMedium
    - RiskLevelHigh
  models.SecuritySettings:
    properties:
      audit_retention:
        type: integer
      enable_2fa:
        type: boolean
      password_policy:
        type: string
      session_timeout:
        type: integer
    type: object
  requests.ApprovalActionRequest:
    properties:
      action:
        description: approve/reject
        type: string
      id:
        type: integer
      reason:
        description: 审批意见
        type: string
    type: object
  requests.ApprovalCreateRequest:
    properties:
      env_name:
        type: string
      image:
        type: string
      image_digest:
        type: string
      pipeline_id:
        type: integer
      pipeline_run_id:
        type: integer
      request_reason:
        type: string
    type: object
  requests.ApprovalDeleteRequest:
    properties:
      id:
        type: integer
    type: object
  requests.ApprovalUpdateRequest:
    properties:
      env_name:
        description: 目标环境
        type: string
      id:
        type: integer
      image:
        description: 镜像地址
        type: string
      image_digest:
