info:
  contact: {}
  description: 基于Gin+Vue开发的K8s管理平台
  termsOfService: https://gitee.com/jay-kim/k8s_operation
  title: K8s管理平台
  version: "1.0"
paths:
  /api/:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: HelloWorld
      tags:
      - HelloWorld
  /api/v1/ai/approvals:
    get:
      description: 获取所有高危操作审批请求，支持按状态筛选
      parameters:
      - default: 0
        description: '状态筛选: 1=待审批 2=已通过 3=已拒绝 4=已过期 5=已取消'
        in: query
        name: status
        type: integer
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      summary: 获取审批列表
      tags:
      - AI 审批管理
  /api/v1/ai/approvals/{id}:
    get:
      parameters:
      - description: 审批ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      summary: 获取审批详情
      tags:
      - AI 审批管理
  /api/v1/ai/approvals/{id}/approve:
    post:
      consumes:
      - application/json
      description: 管理员通过高危操作审批
      parameters:
      - description: 审批ID
        in: path
        name: id
        required: true
        type: integer
      - description: 审批备注
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      summary: 通过审批
      tags:
      - AI 审批管理
  /api/v1/ai/approvals/{id}/cancel:
    post:
      parameters:
      - description: 审批ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      summary: 取消审批
      tags:
      - AI 审批管理
  /api/v1/ai/approvals/{id}/reject:
    post:
      consumes:
      - application/json
      description: 管理员拒绝高危操作审批
      parameters:
      - description: 审批ID
        in: path
        name: id
        required: true
        type: integer
      - description: 拒绝原因
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      summary: 拒绝审批
      tags:
      - AI 审批管理
  /api/v1/ai/approvals/mine:
    get:
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      summary: 获取我的审批申请
      tags:
      - AI 审批管理
  /api/v1/ai/approvals/pending-count:
    get:
      description: 用于前端侧边栏 Badge 显示
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      summary: 获取待审批数量
      tags:
      - AI 审批管理
  /api/v1/ai/chat:
    post:
      consumes:
      - application/json
      description: 向 AI 助手发送消息并获取回复，高危操作会自动触发审批流程
      parameters:
      - description: 聊天请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.AIChatRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.AIChatResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: AI 对话
      tags:
      - AI 助手
  /api/v1/ai/chat/stream:
    post:
      consumes:
      - application/json
      description: 向 AI 助手发送消息，通过 SSE 流式接收回复
      parameters:
      - description: 聊天请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.AIChatRequest'
      produces:
      - text/event-stream
      responses: {}
      summary: AI 流式对话
      tags:
      - AI 助手
  /api/v1/ai/conversations:
    get:
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      summary: 获取 AI 会话列表
      tags:
      - AI 助手
  /api/v1/ai/conversations/{id}:
    delete:
      parameters:
      - description: 会话ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      summary: 删除 AI 会话
      tags:
      - AI 助手
  /api/v1/ai/conversations/{id}/messages:
    get:
      parameters:
      - description: 会话ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      summary: 获取会话消息列表
      tags:
      - AI 助手
  /api/v1/ai/intent:
    post:
      consumes:
      - application/json
      description: 分析用户输入的操作意图，返回风险等级和是否需要审批
      parameters:
      - description: 请求体
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      summary: AI 意图分析
      tags:
      - AI 助手
  /api/v1/ai/logs:
    get:
      description: 获取 AI 助手的最近日志记录，用于排查大模型问题
      parameters:
      - default: 100
        description: 返回行数
        in: query
        name: lines
        type: integer
      - default: '""'
        description: 级别过滤(error/warn/info)
        in: query
        name: level
        type: string
      - description: 关键字搜索
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      summary: AI 日志查询
      tags:
      - AI 助手
  /api/v1/ai/quick-ask:
    post:
      consumes:
      - application/json
      description: 无需会话上下文的快捷提问，适用于全局 AI 入口
      parameters:
      - description: 请求体
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      summary: AI 快捷问答
      tags:
      - AI 助手
  /api/v1/auth/forgot_password:
    post:
      description: 根据用户名重置密码
      parameters:
      - description: body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/requests.AuthForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            type: string
        "400":
          description: 请求错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 忘记密码
      tags:
      - 认证管理
  /api/v1/auth/login:
    post:
      description: 用户登录
      parameters:
      - description: body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/requests.AuthLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            type: string
        "400":
          description: 请求错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 用户登录
      tags:
      - 认证管理
  /api/v1/auth/logout:
    post:
      description: 清空会话并让会话 Cookie 立即过期（注意：不会自动使现有 JWT 失效）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 退出登录
      tags:
      - 认证管理
  /api/v1/auth/refresh:
    post:
      description: 使用旧的 Token 刷新并返回新的 Token
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            type: string
        "401":
          description: Token 无效或已超过最大刷新时间
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 刷新访问令牌
      tags:
      - 认证管理
  /api/v1/auth/register:
    post:
      consumes:
